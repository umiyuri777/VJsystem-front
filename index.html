<!DOCTYPE html>
<html lang="ja">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>観客</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="screen1" class="screen">
      <h1>どちら側？</h1>
      <div class="row">
        <button type="button" class="team-btn team-btn--red" data-team="red" aria-label="紅">紅</button>
        <button type="button" class="team-btn team-btn--white" data-team="white" aria-label="白">白</button>
      </div>
    </div>

    <div id="screen2" class="screen hidden">
      <p class="label-you">あなた</p>
      <div id="teamPill" class="team-pill" aria-live="polite"></div>
      <p class="hint">音楽に合わせて</p>
      <p class="shake">振れ！</p>
      <p id="motionStatus" class="sub"></p>
      <p id="shakeCounter" class="counter"></p>
      <div id="desktopWarn" class="warn hidden">
        加速度センサーが使えない環境です。スマートフォンのブラウザで開いてください。
      </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
