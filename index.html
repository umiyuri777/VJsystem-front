<!DOCTYPE html>
<html lang="ja">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>観客</title>
    <style>
      :root {
        --bg: #0f1115;
        --text: #f2f4f8;
        --muted: #9aa3b2;
        --red: #e25555;
        --white: #e8eaef;
        --card: #1a1e27;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        padding: 24px 20px 32px;
      }
      .screen {
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
      }
      .hidden {
        display: none !important;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        text-align: center;
        margin: 0 0 28px;
        letter-spacing: 0.02em;
      }
      .row {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
      }
      .team-btn {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid transparent;
        font-size: 1.5rem;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .team-btn:active {
        transform: scale(0.96);
      }
      .team-btn--red {
        background: linear-gradient(145deg, #c73e3e, #8f2a2a);
        color: #fff;
        box-shadow: 0 8px 24px rgba(226, 85, 85, 0.35);
      }
      .team-btn--white {
        background: linear-gradient(145deg, #f0f2f6, #c8ccd4);
        color: #1a1e27;
        border-color: rgba(255, 255, 255, 0.35);
        box-shadow: 0 8px 24px rgba(255, 255, 255, 0.12);
      }
      .label-you {
        text-align: center;
        font-size: 1rem;
        color: var(--muted);
        margin-bottom: 16px;
      }
      .team-pill {
        width: 96px;
        height: 96px;
        margin: 0 auto 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.75rem;
        font-weight: 800;
        background: var(--card);
        border: 3px solid rgba(255, 255, 255, 0.08);
      }
      .team-pill--red {
        color: var(--red);
        border-color: rgba(226, 85, 85, 0.45);
      }
      .team-pill--white {
        color: var(--white);
        border-color: rgba(232, 234, 239, 0.35);
      }
      .hint {
        text-align: center;
        font-size: 1rem;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .shake {
        text-align: center;
        font-size: clamp(2.5rem, 12vw, 3.5rem);
        font-weight: 800;
        letter-spacing: 0.06em;
        margin: 8px 0 20px;
      }
      .sub {
        text-align: center;
        font-size: 0.85rem;
        color: var(--muted);
        line-height: 1.5;
      }
      .counter {
        text-align: center;
        font-variant-numeric: tabular-nums;
        font-size: 0.95rem;
        color: var(--muted);
        margin-top: 12px;
      }
      .warn {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 10px;
        background: rgba(255, 196, 90, 0.12);
        color: #ffc45a;
        font-size: 0.88rem;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div id="screen1" class="screen">
      <h1>どちら側？</h1>
      <div class="row">
        <button type="button" class="team-btn team-btn--red" data-team="red" aria-label="紅">紅</button>
        <button type="button" class="team-btn team-btn--white" data-team="white" aria-label="白">白</button>
      </div>
    </div>

    <div id="screen2" class="screen hidden">
      <p class="label-you">あなた</p>
      <div id="teamPill" class="team-pill" aria-live="polite"></div>
      <p class="hint">音楽に合わせて</p>
      <p class="shake">振れ！</p>
      <p id="motionStatus" class="sub"></p>
      <p id="shakeCounter" class="counter"></p>
      <div id="desktopWarn" class="warn hidden">
        加速度センサーが使えない環境です。スマートフォンのブラウザで開いてください。
      </div>
    </div>

    <script>
      /** @type {'red' | 'white' | null} */
      let selectedTeam = null;

      const SHAKE_COOLDOWN_MS = 180;
      /** 線形加速度 (m/s²) 用 */
      const LINEAR_THRESHOLD = 14;
      /** 重力込みのときの |a| からの偏差 */
      const GRAVITY_MAG = 9.80665;
      const INCLUDING_GRAVITY_DEV_THRESHOLD = 4;

      let shakesThisSecond = 0;
      let lastPeakTime = 0;
      /** @type {null | 'linear' | 'including'} */
      let lockedAccelMode = null;
      let postIntervalId = 0;

      const screen1 = document.getElementById('screen1');
      const screen2 = document.getElementById('screen2');
      const teamPill = document.getElementById('teamPill');
      const motionStatus = document.getElementById('motionStatus');
      const shakeCounter = document.getElementById('shakeCounter');
      const desktopWarn = document.getElementById('desktopWarn');

      function teamLabel(team) {
        return team === 'red' ? '紅' : '白';
      }

      /**
       * @param {DeviceMotionEvent} event
       */
      function onDeviceMotion(event) {
        let ax;
        let ay;
        let az;
        let mode = lockedAccelMode;

        if (!mode) {
          const acc = event.acceleration;
          if (acc && acc.x != null && acc.y != null && acc.z != null) {
            mode = 'linear';
          } else {
            const ig = event.accelerationIncludingGravity;
            if (ig && ig.x != null && ig.y != null && ig.z != null) {
              mode = 'including';
            } else {
              return;
            }
          }
          lockedAccelMode = mode;
        }

        if (mode === 'linear') {
          const acc = event.acceleration;
          if (!acc || acc.x == null || acc.y == null || acc.z == null) {
            return;
          }
          ax = acc.x;
          ay = acc.y;
          az = acc.z;
        } else {
          const ig = event.accelerationIncludingGravity;
          if (!ig || ig.x == null || ig.y == null || ig.z == null) {
            return;
          }
          ax = ig.x;
          ay = ig.y;
          az = ig.z;
        }

        const mag = Math.sqrt(ax * ax + ay * ay + az * az);
        let strength;
        if (mode === 'linear') {
          strength = mag;
        } else {
          strength = Math.abs(mag - GRAVITY_MAG);
        }

        const threshold = mode === 'linear' ? LINEAR_THRESHOLD : INCLUDING_GRAVITY_DEV_THRESHOLD;
        const now = Date.now();
        if (strength > threshold && now - lastPeakTime >= SHAKE_COOLDOWN_MS) {
          lastPeakTime = now;
          shakesThisSecond += 1;
          shakeCounter.textContent = 'この1秒: ' + shakesThisSecond + ' 回';
        }
      }

      function startPosting() {
        if (postIntervalId) {
          clearInterval(postIntervalId);
        }
        postIntervalId = window.setInterval(function () {
          const count = shakesThisSecond;
          shakesThisSecond = 0;
          shakeCounter.textContent = 'この1秒: 0 回';
          if (!selectedTeam) {
            return;
          }
          if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
              .withFailureHandler(function (err) {
                console.error(err);
              })
              .withSuccessHandler(function (result) {
                if (result && result.ok === false) {
                  console.error(result);
                }
              })
              .reportShake(selectedTeam, count);
          } else {
            console.error('google.script.run が使えません（GAS のウェブアプリとして開いてください）。');
          }
        }, 1000);
      }

      /**
       * @param {'red' | 'white'} team
       */
      async function onChooseTeam(team) {
        selectedTeam = team;

        if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission) {
          try {
            const state = await DeviceMotionEvent.requestPermission();
            if (state !== 'granted') {
              motionStatus.textContent = 'モーションの許可が得られませんでした。';
            }
          } catch (e) {
            console.error(e);
            motionStatus.textContent = 'モーションの許可に失敗しました。';
          }
        }

        teamPill.textContent = teamLabel(team);
        teamPill.classList.remove('team-pill--red', 'team-pill--white');
        teamPill.classList.add(team === 'red' ? 'team-pill--red' : 'team-pill--white');

        screen1.classList.add('hidden');
        screen2.classList.remove('hidden');

        if (!window.DeviceMotionEvent) {
          desktopWarn.classList.remove('hidden');
          return;
        }

        window.addEventListener('devicemotion', onDeviceMotion, true);
        motionStatus.textContent = 'センサー待機中… 端末を振ってください。';
        shakeCounter.textContent = 'この1秒: 0 回';
        startPosting();
      }

      document.querySelectorAll('.team-btn[data-team]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const team = /** @type {'red' | 'white'} */ (btn.getAttribute('data-team'));
          void onChooseTeam(team);
        });
      });
    </script>
  </body>
</html>
